<svg xmlns="http://www.w3.org/2000/svg" width="420" height="502" viewBox="0 0 420 502">
  <defs>
    <style>
      .title { font: 700 18px system-ui, -apple-system, sans-serif; fill: #24292f; }
      .cat-label { font: 400 13px system-ui, -apple-system, sans-serif; fill: #57606a; }
      .cat-value { font: 700 13px system-ui, -apple-system, sans-serif; fill: #24292f; }
      .sep-label { font: 600 13px system-ui, -apple-system, sans-serif; fill: #24292f; }
      .sep-value { font: 700 13px system-ui, -apple-system, sans-serif; fill: #0969da; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="8" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title -->
  <text x="30" y="46" class="title">Tech Stack Stats</text>

  
  
  

  <!-- Category rows -->
  
  
  <g transform="translate(30, 72)">
    <circle cx="6" cy="-4" r="5" fill="#f1e05a"/>
    <text x="18" y="0" class="cat-label">Languages</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">11</text>
  </g>
  
  
  <g transform="translate(30, 102)">
    <circle cx="6" cy="-4" r="5" fill="#61dafb"/>
    <text x="18" y="0" class="cat-label">Frameworks</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">4</text>
  </g>
  
  
  <g transform="translate(30, 132)">
    <circle cx="6" cy="-4" r="5" fill="#56d4dd"/>
    <text x="18" y="0" class="cat-label">HTTP & API</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">3</text>
  </g>
  
  
  <g transform="translate(30, 162)">
    <circle cx="6" cy="-4" r="5" fill="#ff7b72"/>
    <text x="18" y="0" class="cat-label">Build Tools</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">2</text>
  </g>
  
  
  <g transform="translate(30, 192)">
    <circle cx="6" cy="-4" r="5" fill="#8b949e"/>
    <text x="18" y="0" class="cat-label">State Mgmt</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">2</text>
  </g>
  
  
  <g transform="translate(30, 222)">
    <circle cx="6" cy="-4" r="5" fill="#e377c2"/>
    <text x="18" y="0" class="cat-label">UI & Styling</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">2</text>
  </g>
  
  
  <g transform="translate(30, 252)">
    <circle cx="6" cy="-4" r="5" fill="#f0883e"/>
    <text x="18" y="0" class="cat-label">DevOps & CI</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">2</text>
  </g>
  
  
  <g transform="translate(30, 282)">
    <circle cx="6" cy="-4" r="5" fill="#da3633"/>
    <text x="18" y="0" class="cat-label">Backend & Server</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">1</text>
  </g>
  
  
  <g transform="translate(30, 312)">
    <circle cx="6" cy="-4" r="5" fill="#d29922"/>
    <text x="18" y="0" class="cat-label">Testing</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">1</text>
  </g>
  
  
  <g transform="translate(30, 342)">
    <circle cx="6" cy="-4" r="5" fill="#3fb950"/>
    <text x="18" y="0" class="cat-label">Database & Storage</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">1</text>
  </g>
  
  
  <g transform="translate(30, 372)">
    <circle cx="6" cy="-4" r="5" fill="#f778ba"/>
    <text x="18" y="0" class="cat-label">Hosting</text>
    <text x="360" y="0" text-anchor="end" class="cat-value">1</text>
  </g>
  

  <!-- Separator line -->
  
  <line x1="30" y1="412" x2="390" y2="412" stroke="#d0d7de" stroke-width="1" opacity="0.4"/>

  <!-- Totals -->
  
  <g transform="translate(30, 440)">
    <text x="0" y="0" class="sep-label">Total Technologies</text>
    <text x="360" y="0" text-anchor="end" class="sep-value">30</text>
  </g>
  <g transform="translate(30, 466)">
    <text x="0" y="0" class="sep-label">Repos Analyzed</text>
    <text x="360" y="0" text-anchor="end" class="sep-value">18</text>
  </g>
