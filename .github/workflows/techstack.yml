name: Update Tech Stack SVGs

on:
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight UTC
  workflow_dispatch:       # Manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Checkout github-framework-stats
        uses: actions/checkout@v4
        with:
          repository: TheSeydiCharyyev/github-framework-stats
          path: github-framework-stats

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install httpx jinja2 python-dotenv

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python github-framework-stats/generate_static.py ${{ github.workspace }}

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add techstack_stats.svg techstack_pie.svg techstack_grid.svg
          git diff --staged --quiet || git commit -m "Update tech stack SVGs" && git push
