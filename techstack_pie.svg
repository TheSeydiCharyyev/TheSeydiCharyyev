<svg xmlns="http://www.w3.org/2000/svg" width="420" height="188" viewBox="0 0 420 188">
  <defs>
    <style>
      .title { font: 600 14px system-ui, -apple-system, sans-serif; fill: #24292f; }
      .lang-name { font: 400 11px system-ui, -apple-system, sans-serif; fill: #24292f; }
      .lang-pct { font: 400 11px system-ui, -apple-system, sans-serif; fill: #57606a; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" rx="6" stroke="#d0d7de" stroke-width="1"/>

  <!-- Title -->
  <text x="25" y="35" class="title">Most Used Technologies</text>

  
  
  
  

  <!-- Stacked progress bar -->
  <clipPath id="bar-clip">
    <rect x="25" y="52" width="370" height="8" rx="4"/>
  </clipPath>
  <g clip-path="url(#bar-clip)">
    
    
    
    <rect x="25" y="52" width="131.08823529411765" height="8" fill="#61DAFB"/>
    
    
    
    <rect x="155.58823529411765" y="52" width="65.79411764705883" height="8" fill="#646CFF"/>
    
    
    
    <rect x="220.88235294117646" y="52" width="44.029411764705884" height="8" fill="#06B6D4"/>
    
    
    
    <rect x="264.4117647058823" y="52" width="44.029411764705884" height="8" fill="#02569B"/>
    
    
    
    <rect x="307.94117647058823" y="52" width="22.264705882352942" height="8" fill="#000000"/>
    
    
    
    <rect x="329.70588235294116" y="52" width="22.264705882352942" height="8" fill="#2088FF"/>
    
    
    
    <rect x="351.4705882352941" y="52" width="22.264705882352942" height="8" fill="#009688"/>
    
    
    
    <rect x="373.235294117647" y="52" width="22.264705882352942" height="8" fill="#3B82F6"/>
    
    
  </g>

  <!-- Legend (2 columns) -->
  
  
  
  
  
  
  
  
  <g transform="translate(25.0, 84)">
